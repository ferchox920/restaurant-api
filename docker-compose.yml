services:
  postgres:
    image: postgres:16-alpine
    container_name: restaurat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: restaurant_admin
      POSTGRES_USER: restaurant_admin
      POSTGRES_PASSWORD: restaurant_admin_dev
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U restaurant_admin -d restaurant_admin']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
